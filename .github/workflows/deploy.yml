name: Build and Submit IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run audit:high
      - run: npm run seo:og
      - run: npm run seo:pages
      - run: npm run seo:sitemap
      - run: npm run build
      - run: npm run test:security
      - run: npm run validate:seo
      - run: npm run validate:performance
      - run: npm run test:a11y

  indexnow:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run seo:og
      - run: npm run seo:pages
      - run: npm run seo:sitemap
      - run: npm run build
      - name: Check production IndexNow key
        run: |
          set -euo pipefail
          key="91a714f93cc24a8c95f1efe0d9e9a914"
          key_url="https://applycraft.io/${key}.txt"

          for attempt in $(seq 1 20); do
            key_body="$(curl -fsS "$key_url" || true)"
            if [ "$key_body" = "$key" ]; then
              echo "Production IndexNow key file is live."
              echo "### IndexNow key check" >> "$GITHUB_STEP_SUMMARY"
              echo "Key file returned 200 and matched at $key_url." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "Production IndexNow key is not ready yet. Retry ${attempt}/20."
            sleep 15
          done

          echo "### IndexNow key check failed" >> "$GITHUB_STEP_SUMMARY"
          echo "The key file did not return the expected value at $key_url." >> "$GITHUB_STEP_SUMMARY"
          exit 1
      - run: npm run seo:indexnow
      - name: Purge Cloudflare cache
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESPONSE"
          if ! echo "$RESPONSE" | grep -q '"success":\s*true'; then
            echo "::error::Cloudflare cache purge failed"
            exit 1
          fi
          echo "### Cloudflare cache" >> $GITHUB_STEP_SUMMARY
          echo "Cache purged successfully after deploy." >> $GITHUB_STEP_SUMMARY
      - name: Production redirect-loop audit
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if npm run seo:audit; then
              exit 0
            fi
            echo "Production redirect audit failed before the new deploy was visible. Retry ${attempt}/20."
            sleep 15
          done
          npm run seo:audit
